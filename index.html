<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 衣着颜色识别 - 增强版</title>
    <style>
        :root {
            --bg-color: #111827;
            --text-color: #ffffff;
            --accent-color: #2563eb;
            --panel-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.8s ease, color 0.8s ease;
        }

        .container {
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            margin: 0 0 8px 0;
            font-size: 2.2rem;
        }

        .header p {
            color: #9ca3af;
            margin: 0;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .video-box {
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 4px solid #374151;
            aspect-ratio: 4/3;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            background: #000;
        }

        .placeholder-text {
            position: absolute;
            color: #4b5563;
            font-size: 0.9rem;
            z-index: 1;
        }

        .info-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 0.8rem;
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .status-badge.active {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 10px;
            background: currentColor;
        }

        .color-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #9ca3af;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        #color-name {
            font-size: 3rem;
            font-weight: 900;
            margin: 0 0 12px 0;
        }

        #color-hex {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.8rem;
            opacity: 0.8;
            font-weight: bold;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(37, 99, 235, 0.39);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.45);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-stop {
            background: #ef4444;
            box-shadow: 0 4px 14px 0 rgba(239, 68, 68, 0.39);
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #error-box {
            display: none;
            background: rgba(153, 27, 27, 0.9);
            color: #fecaca;
            padding: 16px;
            border-radius: 12px;
            margin-top: 24px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body id="body-bg">
    
    <div class="container">
        <div class="header">
            <h1>AI 视觉色彩同步</h1>
            <p>实时分析衣着颜色，让页面与你同频</p>
        </div>

        <div class="main-grid">
            <div class="video-box">
                <div id="no-cam-placeholder" class="placeholder-text">等待摄像头开启...</div>
                <video id="webcam" autoplay playsinline></video>
                <canvas id="capture-canvas" style="display:none;"></canvas>
                <div id="loading-overlay">
                    <div class="spinner"></div>
                    <span style="font-size: 0.9rem;">AI 正在感知色彩...</span>
                </div>
            </div>

            <div class="info-panel">
                <div>
                    <div id="status-badge" class="status-badge">
                        <div class="dot"></div>
                        <span id="status-text">就绪</span>
                    </div>
                    
                    <div style="margin-bottom: 30px;">
                        <div class="color-title">当前检测到的颜色</div>
                        <div id="color-name">待检测</div>
                        <div id="color-hex">#------</div>
                    </div>
                </div>

                <div>
                    <button id="start-btn" class="btn">开始识别</button>
                    <p id="mode-tip" style="font-size: 11px; color: #6b7280; text-align: center; margin-top: 12px; line-height: 1.4;">
                        若无摄像头硬件，点击后将进入<br>“随机演示模式”展现效果。
                    </p>
                </div>
            </div>
        </div>

        <div id="error-box"></div>
    </div>

    <script>
        const apiKey = ""; // 运行时环境将提供
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('capture-canvas');
        const bodyBg = document.getElementById('body-bg');
        const startBtn = document.getElementById('start-btn');
        const colorNameDisplay = document.getElementById('color-name');
        const colorHexDisplay = document.getElementById('color-hex');
        const statusBadge = document.getElementById('status-badge');
        const statusText = document.getElementById('status-text');
        const loadingOverlay = document.getElementById('loading-overlay');
        const errorBox = document.getElementById('error-box');
        const placeholder = document.getElementById('no-cam-placeholder');

        let isRunning = false;
        let isDemoMode = false;
        let analysisInterval = null;

        // 模拟识别的预设颜色
        const demoColors = [
            {name: "烈焰红", hex: "#E74C3C"},
            {name: "湖水蓝", hex: "#3498DB"},
            {name: "翡翠绿", hex: "#2ECC71"},
            {name: "暖阳橙", hex: "#E67E22"},
            {name: "罗兰紫", hex: "#9B59B6"},
            {name: "高级灰", hex: "#95A5A6"},
            {name: "深邃黑", hex: "#2C3E50"},
            {name: "柠檬黄", hex: "#F1C40F"}
        ];

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' }, 
                    audio: false 
                });
                video.srcObject = stream;
                placeholder.style.display = 'none';
                return true;
            } catch (err) {
                console.warn("无法启动摄像头，将切换为演示模式:", err);
                placeholder.textContent = "[ 未检测到可用摄像头 ]";
                return false;
            }
        }

        async function analyzeColor() {
            if (!isRunning) return;
            loadingOverlay.style.display = 'flex';

            // 如果是演示模式
            if (isDemoMode) {
                await new Promise(r => setTimeout(r, 800)); // 模拟分析耗时
                const randomColor = demoColors[Math.floor(Math.random() * demoColors.length)];
                updateUI(randomColor.name, randomColor.hex);
                loadingOverlay.style.display = 'none';
                return;
            }

            // 正常模式：使用 AI API
            try {
                const context = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                // 压缩图片以减少流量
                const base64Image = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

                const prompt = "识别图中人物衣服的主颜色。只返回JSON: {\"colorName\": \"颜色中文名\", \"hexCode\": \"#HEX\"}";

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                            ]
                        }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error("API 请求失败");
                const resData = await response.json();
                const textResult = resData.candidates[0].content.parts[0].text;
                const data = JSON.parse(textResult);
                updateUI(data.colorName, data.hexCode);
            } catch (err) {
                console.error("AI 识别失败:", err);
                // AI 失败时自动退回到演示模式的一组数据，防止界面卡死
                const failColor = demoColors[Math.floor(Math.random() * demoColors.length)];
                updateUI(failColor.name + "(模拟)", failColor.hex);
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }

        function updateUI(name, hex) {
            colorNameDisplay.textContent = name;
            colorHexDisplay.textContent = hex;
            bodyBg.style.backgroundColor = hex;
            
            // 亮度算法切换文字颜色
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            
            const darkColor = '#111827';
            const lightColor = '#ffffff';
            
            bodyBg.style.color = brightness > 125 ? darkColor : lightColor;
            
            // 更新按钮和辅助文字颜色以适应背景
            if (brightness > 125) {
                document.querySelectorAll('.color-title').forEach(el => el.style.color = 'rgba(0,0,0,0.5)');
                placeholder.style.color = 'rgba(0,0,0,0.3)';
            } else {
                document.querySelectorAll('.color-title').forEach(el => el.style.color = '#9ca3af');
                placeholder.style.color = '#4b5563';
            }
        }

        startBtn.addEventListener('click', async () => {
            if (!isRunning) {
                const hasCamera = await setupCamera();
                isRunning = true;
                isDemoMode = !hasCamera;
                
                startBtn.textContent = "停止识别";
                startBtn.classList.add('btn-stop');
                statusBadge.classList.add('active');
                statusText.textContent = isDemoMode ? "演示模式中 (每5秒更新)" : "AI 实时监控中";
                
                analyzeColor();
                analysisInterval = setInterval(analyzeColor, 5000);
            } else {
                isRunning = false;
                clearInterval(analysisInterval);
                startBtn.textContent = "开始识别";
                startBtn.classList.remove('btn-stop');
                statusBadge.classList.remove('active');
                statusText.textContent = "已停止";
                bodyBg.style.backgroundColor = "";
                bodyBg.style.color = "";
                
                // 停止视频流
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                    video.srcObject = null;
                }
                placeholder.style.display = 'block';
                placeholder.textContent = "等待摄像头开启...";
            }
        });
    </script>
</body>
</html>
